<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚂 Fairplay Rail - Anti-Bot Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        
        .info-box {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #3498db;
        }
        
        #tracking-area {
            width: 800px;
            height: 400px;
            border: 3px solid #3498db;
            border-radius: 10px;
            margin: 20px 0;
            background: white;
            cursor: crosshair;
        }
        
        #status {
            font-size: 20px;
            color: #2c3e50;
            padding: 15px;
            background: #fff;
            border-radius: 5px;
            margin: 15px 0;
        }
        
        button {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 5px;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        .human {
            color: #27ae60;
            font-weight: bold;
        }
        
        .bot {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🚂 Fairplay Rail</h1>
    <h2 style="text-align: center; color: #7f8c8d;">AI-Powered Anti-Bot Engine for IRCTC Tatkal</h2>
    
    <div class="info-box">
        <strong>How to use:</strong> Move your mouse naturally in the box below. 
        Our AI will analyze your movement and tell if you're a human or bot!
    </div>
    
    <div id="tracking-area"></div>
    
    <div id="status">👆 Start moving your mouse to begin tracking...</div>
    
    <div style="text-align: center; margin: 20px;">
        <button onclick="stopTracking()">✅ Stop & Test</button>
        <button onclick="resetTracking()">🔄 Reset</button>
    </div>
    
    <div id="result" style="text-align: center; font-size: 24px; margin: 20px; padding: 20px; background: white; border-radius: 10px; display: none;"></div>
    
    <script>
        // Track mouse movement
        let mouseData = [];
        let isTracking = false;
        let startTime = 0;
        
        document.getElementById('tracking-area').addEventListener('mousemove', function(event) {
            if (!isTracking) return;
            
            let time = Date.now() - startTime;
            mouseData.push({
                x: event.clientX,
                y: event.clientY,
                time: time
            });
            
            // Update status
            document.getElementById('status').innerHTML = 
                `🖱️ Mouse moves collected: <strong>${mouseData.length}</strong>`;
        });
        
        // Start tracking when user first moves mouse
        document.getElementById('tracking-area').addEventListener('mouseenter', function() {
            if (mouseData.length === 0 && !isTracking) {
                isTracking = true;
                startTime = Date.now();
                document.getElementById('status').innerHTML = 
                    `✅ Tracking started! Move your mouse naturally...`;
            }
        });
        
        function stopTracking() {
            isTracking = false;
            
            if (mouseData.length < 10) {
                document.getElementById('result').innerHTML = 
                    '<span class="bot">⚠️ Please move your mouse more first!</span>';
                document.getElementById('result').style.display = 'block';
                return;
            }
            
            // Calculate average speed
            let speeds = [];
            for (let i = 1; i < mouseData.length; i++) {
                let prev = mouseData[i-1];
                let current = mouseData[i];
                
                let distance = Math.sqrt(
                    Math.pow(current.x - prev.x, 2) + 
                    Math.pow(current.y - prev.y, 2)
                );
                let timeDiff = current.time - prev.time;
                
                if (timeDiff > 0) {
                    let speed = distance / timeDiff;
                    speeds.push(speed);
                }
            }
            
            let averageSpeed = speeds.reduce((a, b) => a + b, 0) / speeds.length;
            
            // Simple rule: bots move super fast!
            let resultDiv = document.getElementById('result');
            if (averageSpeed > 300) {
                resultDiv.innerHTML = '<span class="bot">🤖 BOT detected! (Speed: ' + averageSpeed.toFixed(2) + ' px/ms)</span>';
            } else {
                resultDiv.innerHTML = '<span class="human">✅ HUMAN detected! (Speed: ' + averageSpeed.toFixed(2) + ' px/ms)</span>';
            }
            resultDiv.style.display = 'block';
            
            document.getElementById('status').innerHTML = 
                `✅ Collected ${mouseData.length} mouse movements! Result shown below.`;
            
            console.log("Mouse data:", mouseData);
            console.log("Average speed:", averageSpeed);
        }
        
        function resetTracking() {
            mouseData = [];
            isTracking = false;
            document.getElementById('status').innerHTML = 
                '👆 Start moving your mouse to begin tracking...';
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
